---
name: checks

"on":
  push:
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential curl fd-find git jq ripgrep shellcheck unzip
          sudo ln -sf /usr/bin/fdfind /usr/local/bin/fd

      - name: Install Neovim
        env:
          RELEASES: https://github.com/neovim/neovim/releases/download
          NVIM_VERSION: v0.12.4
        run: |
          curl -fL \
            "$RELEASES/$NVIM_VERSION/nvim-linux-x86_64.tar.gz" \
            -o /tmp/nvim.tar.gz
          sudo tar -C /opt -xzf /tmp/nvim.tar.gz
          echo /opt/nvim-linux-x86_64/bin >> "$GITHUB_PATH"

      - name: Restore plugins
        run: |
          mkdir -p "$HOME/.config"
          ln -s "$GITHUB_WORKSPACE" "$HOME/.config/nvim"
          nvim --headless "+Lazy! restore" +qa

      - name: Install check tools
        run: >-
          nvim --headless
          "+MasonInstall stylua@v2.5.2 selene@0.31.0 yamllint@1.38.0"
          +qa

      - name: Run checks
        run: ./scripts/check.sh
